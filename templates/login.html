{% extends "base.html" %}
{% block title %}{{ studio_name }} — Connexion{% endblock %}
{% block body_class %}page-login{% endblock %}

{% block body %}
<main class="login-card">
  <a href="{{ url_for('index') }}" class="brand brand-stack">{{ studio_name }}<span class="dot">.</span></a>
  <p class="hero-eyebrow">Admin · Connexion</p>
  {% if error %}<p class="alert">{{ error }}</p>{% endif %}
  <form method="post" action="{{ url_for('login') }}">
    <label>
      <span>Identifiant</span>
      <input type="text" name="username" autocomplete="username" required autofocus>
    </label>
    <label>
      <span>Mot de passe</span>
      <input type="password" name="password" autocomplete="current-password" required>
    </label>
    <button type="submit" class="btn-primary">Se connecter</button>
  </form>
  <p class="muted small">v{{ app_version }} · <a href="{{ url_for('index') }}">retour au site</a></p>
</main>
{% endblock %}
