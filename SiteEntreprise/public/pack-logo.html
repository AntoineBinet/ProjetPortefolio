  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"fr\"><head>\n<meta charset=\"utf-8\">\n<title>Pack logo — up Technologies<\u002Ftitle>\n<style>\n  :root {\n    --orange: #EF8827;\n    --ink: #11202A;\n    --cream: #f4f1ec;\n    --muted: #55606E;\n    --line: #e6e2db;\n  }\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  body {\n    font-family: 'Inter', system-ui, -apple-system, sans-serif;\n    background: var(--cream);\n    color: var(--ink);\n    line-height: 1.5;\n    -webkit-font-smoothing: antialiased;\n  }\n  .wrap { max-width: 1080px; margin: 0 auto; padding: 48px 32px 80px; }\n  .head { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap; padding-bottom: 24px; border-bottom: 1px solid var(--line); margin-bottom: 32px;}\n  .head h1 { font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 600; margin: 0 0 6px; color: var(--muted);}\n  .head h2 { font-size: 28px; font-weight: 400; margin: 0; letter-spacing: -0.01em;}\n  .head h2 em { font-style: normal; color: var(--orange); font-family: 'Pacifico', cursive;}\n  .head .meta { font-size: 13px; color: var(--muted); text-align: right;}\n\n  .actions { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 40px;}\n  .btn {\n    display: inline-flex; align-items: center; gap: 10px;\n    padding: 14px 22px;\n    background: var(--ink); color: #fff;\n    border: 0; border-radius: 4px;\n    font: 600 14px/1 'Inter', sans-serif;\n    letter-spacing: 0.02em;\n    cursor: pointer;\n    text-decoration: none;\n    transition: transform .08s ease, background .15s ease;\n  }\n  .btn:hover { background: #1a2f3c;}\n  .btn:active { transform: translateY(1px);}\n  .btn.primary { background: var(--orange);}\n  .btn.primary:hover { background: #d97318;}\n  .btn[disabled] { opacity: 0.5; cursor: not-allowed; pointer-events: none;}\n  .btn .sz { opacity: 0.7; font-weight: 400; font-size: 12px;}\n\n  #status {\n    font-size: 12px; color: var(--muted);\n    padding: 10px 14px; background: #fff; border: 1px solid var(--line); border-radius: 4px;\n    margin-bottom: 32px;\n    font-family: ui-monospace, 'SF Mono', Menlo, monospace;\n  }\n  #status.ok { border-color: #c8d8c8; background: #f4faef; color: #2e5d2e;}\n  #status.err { border-color: #e8c0c0; background: #fbf3f3; color: #8a2e2e;}\n\n  .section-title {\n    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;\n    font-weight: 600; color: var(--muted);\n    margin: 40px 0 16px;\n  }\n\n  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px;}\n  .card { background: #fff; border-radius: 6px; overflow: hidden; border: 1px solid var(--line); display: flex; flex-direction: column;}\n  .card.dark { background: var(--ink); border-color: var(--ink);}\n  .card.orange { background: var(--orange); border-color: var(--orange);}\n  .card.cream { background: var(--cream); border-color: var(--line);}\n  .card .h {\n    padding: 10px 14px; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;\n    color: var(--muted); border-bottom: 1px solid #f0eee9; font-weight: 600;\n    display: flex; justify-content: space-between; align-items: center;\n  }\n  .card.dark .h { color: #a8b2bd; border-color: rgba(255,255,255,0.08);}\n  .card.orange .h { color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.18);}\n  .card .h .sz { font-weight: 400; color: #a8b2bd; text-transform: none; letter-spacing: 0;}\n  .card.dark .h .sz { color: #6b7785;}\n  .card.orange .h .sz { color: rgba(255,255,255,0.6);}\n  .card .b {\n    flex: 1;\n    padding: 24px;\n    display: flex; align-items: center; justify-content: center;\n    min-height: 130px;\n  }\n  .card .b svg { display: block; max-width: 100%; max-height: 180px; width: auto; height: auto;}\n  .card.favicon .b svg { max-width: 96px; max-height: 96px;}\n  .card.social .b { padding: 16px; min-height: 220px;}\n  .card.social .b svg { max-width: 100%; max-height: 220px;}\n  .card .foot {\n    padding: 8px 14px;\n    border-top: 1px solid #f0eee9;\n    display: flex; gap: 10px; font-size: 11px;\n  }\n  .card.dark .foot { border-color: rgba(255,255,255,0.08);}\n  .card.orange .foot { border-color: rgba(255,255,255,0.18);}\n  .card .foot a { color: var(--muted); text-decoration: none; padding: 4px 8px; border-radius: 3px; background: #f4f1ec; transition: background .15s;}\n  .card .foot a:hover { background: #e8e3d9; color: var(--ink);}\n  .card.dark .foot a { background: rgba(255,255,255,0.08); color: #d8dde3;}\n  .card.dark .foot a:hover { background: rgba(255,255,255,0.16); color: #fff;}\n  .card.orange .foot a { background: rgba(255,255,255,0.18); color: #fff;}\n  .card.orange .foot a:hover { background: rgba(255,255,255,0.3);}\n\n  .social-grid { grid-template-columns: 1fr;}\n  @media (min-width: 800px) { .social-grid { grid-template-columns: 1fr 1fr;} }\n\n  .readme {\n    background: #fff; border: 1px solid var(--line); border-radius: 6px;\n    padding: 24px 28px; margin-top: 16px;\n    font-size: 14px; color: var(--ink);\n  }\n  .readme h3 { font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin: 0 0 12px; font-weight: 600;}\n  .readme ul { margin: 0 0 8px; padding-left: 22px;}\n  .readme li { margin-bottom: 6px;}\n  .readme code { background: #f4f1ec; padding: 1px 6px; border-radius: 3px; font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 12px;}\n<\u002Fstyle>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n<style>/* cyrillic-ext */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 300;\n  font-display: swap;\n  src: url(\"59910805-6453-494c-b10a-a9e47f628ead\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Inter';\n  font-style: no ily: 'Inter';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"1fae4195-77d8-4311-a948-326dace4d3b1\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Pacifico';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"737141a6-42eb-46a9-8bd1-06a14b57d6f3\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Pacifico';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"848247cb-1b36-48b8-856a-b0f08c6522ae\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Pacifico';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"4280ee4e-ec4c-426a-ab34-53277958593c\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Pacifico';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"0e65c779-8068-4a4d-b59a-f49c40396af0\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Pacifico';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"15010468-7325-4b47-a934-5c3cd47db188\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<\u002Fhead>\n\n<body>\n<div class=\"wrap\">\n\n  <header class=\"head\">\n    <div>\n      <h1>Pack logo<\u002Fh1>\n      <h2><em>up<\u002Fem> Technologies — kit téléchargeable<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"meta\">\n      SVG vectoriels · PNG haute résolution<br>\n      Favicons · Carte sociale 1200×630\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div class=\"actions\">\n    <button id=\"dl-all\" class=\"btn primary\" disabled=\"\">\n      ⬇ Télécharger le pack complet\n      <span class=\"sz\" id=\"dl-size\">— préparation…<\u002Fspan>\n    <\u002Fbutton>\n    <button id=\"dl-svg\" class=\"btn\" disabled=\"\">SVG uniquement<\u002Fbutton>\n    <button id=\"dl-png\" class=\"btn\" disabled=\"\">PNG uniquement<\u002Fbutton>\n  <\u002Fdiv>\n\n  <div id=\"status\">Initialisation…<\u002Fdiv>\n\n  <div class=\"section-title\">Logos principaux<\u002Fdiv>\n  <div class=\"grid\" id=\"grid-primary\"><\u002Fdiv>\n\n  <div class=\"section-title\">Wordmark “up”<\u002Fdiv>\n  <div class=\"grid\" id=\"grid-wordmark\"><\u002Fdiv>\n\n  <div class=\"section-title\">Favicons (512×512 source)<\u002Fdiv>\n  <div class=\"grid\" id=\"grid-favicon\"><\u002Fdiv>\n\n  <div class=\"section-title\">Carte réseaux sociaux (1200×630 — Open Graph / LinkedIn / X)<\u002Fdiv>\n  <div class=\"grid social-grid\" id=\"grid-social\"><\u002Fdiv>\n\n  <div class=\"section-title\">Comment intégrer<\u002Fdiv>\n  <div class=\"readme\">\n    <h3>Sur un site web<\u002Fh3>\n    <ul>\n      <li><strong>Logo dans le header<\u002Fstrong> : utilise <code>svg/logo-primary.svg<\u002Fcode> — vectoriel, parfaitement net à toutes les tailles.<\u002Fli>\n      <li><strong>Sur fond foncé<\u002Fstrong> : <code>svg/logo-primary-inverse.svg<\u002Fcode>.<\u002Fli>\n      <li><strong>Favicon<\u002Fstrong> : ajoute dans le <code>&lt;head&gt;<\u002Fcode> :\n        <br><code>&lt;link rel=\"icon\" type=\"image/png\" sizes=\"32x32\" href=\"png/favicon-32.png\"&gt;<\u002Fcode>\n        <br><code>&lt;link rel=\"icon\" type=\"image/svg+xml\" href=\"svg/favicon-rounded.svg\"&gt;<\u002Fcode>\n        <br><code>&lt;link rel=\"apple-touch-icon\" href=\"png/favicon-180.png\"&gt;<\u002Fcode>\n      <\u002Fli>\n      <li><strong>Open Graph<\u002Fstrong> (partage Facebook / LinkedIn / WhatsApp) :\n        <br><code>&lt;meta property=\"og:image\" content=\"png/social-card.png\"&gt;<\u002Fcode>\n      <\u002Fli>\n    <\u002Ful>\n    <h3>Sur les réseaux sociaux<\u002Fh3>\n    <ul>\n      <li><strong>Photo de profil<\u002Fstrong> : <code>png/favicon-round-512.png<\u002Fcode> (Instagram, X, LinkedIn).<\u002Fli>\n      <li><strong>Bannière / cover<\u002Fstrong> : <code>png/social-card.png<\u002Fcode> (1200×630).<\u002Fli>\n      <li><strong>Publications<\u002Fstrong> : utilise les SVG dans Canva / Figma — ils restent vectoriels et éditables.<\u002Fli>\n    <\u002Ful>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<script src=\"a3036139-fcee-404c-a9d6-1945098650dd\"><\u002Fscript>\n<script>\n(async () => {\n  const status = document.getElementById('status');\n  const setStatus = (msg, kind) => {\n    status.textContent = msg;\n    status.className = kind || '';\n  };\n\n  try {\n    setStatus('Chargement des polices (latin)…');\n\n    /* ---- Font fetching (same logic as builder) ---- */\n    async function fetchLatinWoff(family, weight) {\n      const css = await (await fetch(`https://fonts.googleapis.com/css2?family=${family}${weight?':wght@'+weight:''}&display=swap`)).text();\n      const blocks = css.split(/@font-face\\s*\\{/).slice(1).map(b => b.split('}')[0]);\n      let target = blocks.find(b => /unicode-range[^;]*U\\+0000-00FF/i.test(b));\n      if (!target) target = blocks[blocks.length - 1];\n      const m = target.match(/url\\((https:[^)]+\\.woff2)\\)/);\n      if (!m) throw new Error('no woff2 for ' + family);\n      const buf = await (await fetch(m[1])).arrayBuffer();\n      const bytes = new Uint8Array(buf);\n      let bin = '';\n      for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);\n      return { base64: btoa(bin), bytes: bytes.length, ab: buf };\n    }\n\n    const [pacifico, interLight, interReg] = await Promise.all([\n      fetchLatinWoff('Pacifico', null),\n      fetchLatinWoff('Inter', 300),\n      fetchLatinWoff('Inter', 400),\n    ]);\n\n    setStatus('Enregistrement des polices…');\n    function b64ToUint8(b64) { const bin = atob(b64); const u8 = new Uint8Array(bin.length); for (let i=0;i<bin.length;i++) u8[i]=bin.charCodeAt(i); return u8; }\n    const ff1 = new FontFace('UTPacifico', b64ToUint8(pacifico.base64), { style:'normal', weight:'400' });\n    const ff2 = new FontFace('UTInter',    b64ToUint8(interLight.base64), { style:'normal', weight:'300' });\n    const ff3 = new FontFace('UTInter',    b64ToUint8(interReg.base64),   { style:'normal', weight:'400' });\n    await Promise.all([ff1.load(), ff2.load(), ff3.load()]);\n    document.fonts.add(ff1); document.fonts.add(ff2); document.fonts.add(ff3);\n\n    setStatus('Mesure du texte & construction des SVG…');\n\n    /* ---- Measurement ---- */\n    const cvs = document.createElement('canvas');\n    const ctx = cvs.getContext('2d');\n    function measure(text, font) {\n      ctx.font = font;\n      const m = ctx.measureText(text);\n      return { w: m.width, ascent: m.actualBoundingBoxAscent || 0, descent: m.actualBoundingBoxDescent || 0 };\n    }\n\n    function fontFaceCSS({ pac, interL, interR }) {\n      const blocks = [];\n      if (pac)    blocks.push(`@font-face{font-family:'Pacifico';font-style:normal;font-weight:400;src:url(data:font/woff2;base64,${pacifico.base64}) format('woff2');}`);\n      if (interL) blocks.push(`@font-face{font-family:'Inter';font-style:normal;font-weight:300;src:url(data:font/woff2;base64,${interLight.base64}) format('woff2');}`);\n      if (interR) blocks.push(`@font-face{font-family:'Inter';font-style:normal;font-weight:400;src:url(data:font/woff2;base64,${interReg.base64}) format('woff2');}`);\n      return blocks.join('');\n    }\n\n    const ORANGE = '#EF8827';\n    const INK = '#11202A';\n    const SVGS = {};\n\n    /* ---- Horizontal logo ---- */\n    function buildHorizontal({ upColor, techColor, includeTagline, taglineColor, label }) {\n      const upSize=140, techSize=56, tagSize=18, pad=24, gap=18;\n      const upM = measure('up', `400 ${upSize}px UTPacifico, Pacifico, cursive`);\n      const techM = measure('Technologies', `300 ${techSize}px UTInter, Inter, sans-serif`);\n      const tagM = includeTagline ? measure('Conseil en ingénierie · depuis 2015', `400 ${tagSize}px UTInter, Inter, sans-serif`) : null;\n      const upX = pad;\n      const techX = upX + upM.w + gap;\n      const W = techX + techM.w + pad;\n      const baseline = pad + upM.ascent;\n      const techY = baseline;\n      let H = Math.max(baseline + upM.descent, baseline + techM.descent) + pad;\n      let taglineSvg = '';\n      if (tagM) {\n        const tagY = H - pad + tagM.ascent;\n        H = tagY + tagM.descent + pad;\n        taglineSvg = `<text x=\"${pad}\" y=\"${tagY.toFixed(2)}\" font-family=\"Inter, sans-serif\" font-weight=\"400\" font-size=\"${tagSize}\" fill=\"${taglineColor}\">Conseil en ingénierie · depuis 2015<\u002Ftext>`;\n      }\n      const ff = fontFaceCSS({ pac: true, interL: true, interR: !!includeTagline });\n      return `<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 ${W.toFixed(2)} ${H.toFixed(2)}\" width=\"${W.toFixed(0)}\" height=\"${H.toFixed(0)}\" role=\"img\" aria-label=\"${label||'up Technologies'}\">\n<defs><style>${ff}<\u002Fstyle><\u002Fdefs>\n<text x=\"${upX}\" y=\"${baseline.toFixed(2)}\" font-family=\"Pacifico, cursive\" font-size=\"${upSize}\" fill=\"${upColor}\">up<\u002Ftext>\n<text x=\"${techX.toFixed(2)}\" y=\"${techY.toFixed(2)}\" font-family=\"Inter, sans-serif\" font-weight=\"300\" font-size=\"${techSize}\" fill=\"${techColor}\">Technologies<\u002Ftext>\n${taglineSvg}\n<\u002Fsvg>`;\n    }\n\n    SVGS['logo-primary']         = buildHorizontal({ upColor: ORANGE, techColor: INK });\n    SVGS['logo-primary-inverse'] = buildHorizontal({ upColor: ORANGE, techColor: '#FFFFFF' });\n    SVGS['logo-mono-dark']       = buildHorizontal({ upColor: INK,    techColor: INK });\n    SVGS['logo-mono-white']      = buildHorizontal({ upColor: '#FFFFFF', techColor: '#FFFFFF' });\n    SVGS['logo-with-tagline']    = buildHorizontal({ upColor: ORANGE, techColor: INK, includeTagline: true, taglineColor: '#55606E' });\n\n    /* ---- Stacked ---- */\n    function buildStacked({ upColor, techColor }) {\n      const upSize=220, techSize=22, tracking=6, pad=28;\n      const upM = measure('up', `400 ${upSize}px UTPacifico, Pacifico, cursive`);\n      const text = 'TECHNOLOGIES';\n      let techW = 0;\n      for (const ch of text) techW += measure(ch, `400 ${techSize}px UTInter, Inter, sans-serif`).w + tracking;\n      techW -= tracking;\n      const W = Math.max(upM.w, techW) + pad*2;\n      const upBaseline = pad + upM.ascent;\n      const techBaseline = upBaseline + upM.descent + 30 + techSize*0.75;\n      const H = techBaseline + 6 + pad;\n      const upX = (W - upM.w)/2;\n      const techX = (W - techW)/2;\n      const ff = fontFaceCSS({ pac: true, interR: true });\n      return `<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 ${W.toFixed(2)} ${H.toFixed(2)}\" width=\"${W.toFixed(0)}\" height=\"${H.toFixed(0)}\" role=\"img\" aria-label=\"up Technologies\">\n<defs><style>${ff}<\u002Fstyle><\u002Fdefs>\n<text x=\"${upX.toFixed(2)}\" y=\"${upBaseline.toFixed(2)}\" font-family=\"Pacifico, cursive\" font-size=\"${upSize}\" fill=\"${upColor}\">up<\u002Ftext>\n<text x=\"${techX.toFixed(2)}\" y=\"${techBaseline.toFixed(2)}\" font-family=\"Inter, sans-serif\" font-weight=\"400\" font-size=\"${techSize}\" fill=\"${techColor}\" letter-spacing=\"${tracking}\">TECHNOLOGIES<\u002Ftext>\n<\u002Fsvg>`;\n    }\n    SVGS['logo-stacked']         = buildStacked({ upColor: ORANGE, techColor: INK });\n    SVGS['logo-stacked-inverse'] = buildStacked({ upColor: ORANGE, techColor: '#FFFFFF' });\n\n    /* ---- Wordmark ---- */\n    function buildWordmark({ color }) {\n      const size=200;\n      const m = measure('up', `400 ${size}px UTPacifico, Pacifico, cursive`);\n      const pad=24;\n      const W = m.w + pad*2;\n      const H = m.ascent + m.descent + pad*2;\n      const x = pad, y = pad + m.ascent;\n      const ff = fontFaceCSS({ pac: true });\n      return `<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 ${W.toFixed(2)} ${H.toFixed(2)}\" width=\"${W.toFixed(0)}\" height=\"${H.toFixed(0)}\" role=\"img\" aria-label=\"up\">\n<defs><style>${ff}<\u002Fstyle><\u002Fdefs>\n<text x=\"${x.toFixed(2)}\" y=\"${y.toFixed(2)}\" font-family=\"Pacifico, cursive\" font-size=\"${size}\" fill=\"${color}\">up<\u002Ftext>\n<\u002Fsvg>`;\n    }\n    SVGS['wordmark-orange'] = buildWordmark({ color: ORANGE });\n    SVGS['wordmark-white']  = buildWordmark({ color: '#FFFFFF' });\n    SVGS['wordmark-ink']    = buildWordmark({ color: INK });\n\n    /* ---- Favicon ---- */\n    function buildFavicon({ bg, color, shape }) {\n      const size=512, fontSize=380;\n      const m = measure('up', `400 ${fontSize}px UTPacifico, Pacifico, cursive`);\n      const x = (size - m.w)/2;\n      const totalH = m.ascent + m.descent;\n      const y = (size - totalH)/2 + m.ascent;\n      const bgEl = shape==='round'\n        ? `<circle cx=\"${size/2}\" cy=\"${size/2}\" r=\"${size/2}\" fill=\"${bg}\"/>`\n        : (shape==='rounded'\n            ? `<rect width=\"${size}\" height=\"${size}\" rx=\"100\" ry=\"100\" fill=\"${bg}\"/>`\n            : `<rect width=\"${size}\" height=\"${size}\" fill=\"${bg}\"/>`);\n      const ff = fontFaceCSS({ pac: true });\n      return `<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 ${size} ${size}\" width=\"${size}\" height=\"${size}\" role=\"img\" aria-label=\"up\">\n<defs><style>${ff}<\u002Fstyle><\u002Fdefs>\n${bgEl}\n<text x=\"${x.toFixed(2)}\" y=\"${y.toFixed(2)}\" font-family=\"Pacifico, cursive\" font-size=\"${fontSize}\" fill=\"${color}\">up<\u002Ftext>\n<\u002Fsvg>`;\n    }\n    SVGS['favicon-square']  = buildFavicon({ bg: ORANGE, color: '#FFFFFF', shape: 'square' });\n    SVGS['favicon-rounded'] = buildFavicon({ bg: ORANGE, color: '#FFFFFF', shape: 'rounded' });\n    SVGS['favicon-round']   = buildFavicon({ bg: ORANGE, color: '#FFFFFF', shape: 'round' });\n    SVGS['favicon-light']   = buildFavicon({ bg: '#FFFFFF', color: ORANGE, shape: 'rounded' });\n    SVGS['favicon-dark']    = buildFavicon({ bg: INK, color: ORANGE, shape: 'rounded' });\n\n    /* ---- Social card ---- */\n    function buildSocial() {\n      const W=1200, H=630;\n      const upSize=240, techSize=100, tagSize=26;\n      const upM = measure('up', `400 ${upSize}px UTPacifico, Pacifico, cursive`);\n      const techM = measure('Technologies', `300 ${techSize}px UTInter, Inter, sans-serif`);\n      const tagM = measure('Conseil en ingénierie · électronique, embarqué & mécatronique', `400 ${tagSize}px UTInter, Inter, sans-serif`);\n      const tagM2 = measure('6 agences en France · depuis 2015', `400 ${tagSize}px UTInter, Inter, sans-serif`);\n      const gap=28;\n      const totalW = upM.w + gap + techM.w;\n      const upX = (W - totalW)/2;\n      const techX = upX + upM.w + gap;\n      const baseline = H/2 + 20;\n      const tagY1 = baseline + 80;\n      const tagY2 = tagY1 + 38;\n      const ff = fontFaceCSS({ pac: true, interL: true, interR: true });\n      return `<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 ${W} ${H}\" width=\"${W}\" height=\"${H}\" role=\"img\" aria-label=\"up Technologies\">\n<defs><style>${ff}<\u002Fstyle><\u002Fdefs>\n<rect width=\"${W}\" height=\"${H}\" fill=\"#f4f1ec\"/>\n<rect x=\"60\" y=\"60\" width=\"80\" height=\"3\" fill=\"${ORANGE}\"/>\n<rect x=\"${W-140}\" y=\"${H-63}\" width=\"80\" height=\"3\" fill=\"${ORANGE}\"/>\n<text x=\"${upX.toFixed(2)}\" y=\"${baseline}\" font-family=\"Pacifico, cursive\" font-size=\"${upSize}\" fill=\"${ORANGE}\">up<\u002Ftext>\n<text x=\"${techX.toFixed(2)}\" y=\"${baseline}\" font-family=\"Inter, sans-serif\" font-weight=\"300\" font-size=\"${techSize}\" fill=\"${INK}\">Technologies<\u002Ftext>\n<text x=\"${(W - tagM.w)/2}\" y=\"${tagY1}\" font-family=\"Inter, sans-serif\" font-weight=\"400\" font-size=\"${tagSize}\" fill=\"#55606E\">Conseil en ingénierie · électronique, embarqué &amp; mécatronique<\u002Ftext>\n<text x=\"${(W - tagM2.w)/2}\" y=\"${tagY2}\" font-family=\"Inter, sans-serif\" font-weight=\"400\" font-size=\"${tagSize}\" fill=\"#55606E\" font-style=\"italic\">6 agences en France · depuis 2015<\u002Ftext>\n<\u002Fsvg>`;\n    }\n    SVGS['social-card'] = buildSocial();\n\n    window.SVGS = SVGS;\n\n    /* ---- Render previews ---- */\n    const PRIMARY = ['logo-primary','logo-primary-inverse','logo-mono-dark','logo-mono-white','logo-with-tagline','logo-stacked','logo-stacked-inverse'];\n    const WORDMARK = ['wordmark-orange','wordmark-white','wordmark-ink'];\n    const FAVICON = ['favicon-square','favicon-rounded','favicon-round','favicon-light','favicon-dark'];\n    const SOCIAL = ['social-card'];\n\n    function cls(k) {\n      if (['logo-primary-inverse','logo-mono-white','logo-stacked-inverse','favicon-dark'].includes(k)) return 'dark';\n      if (k === 'wordmark-white') return 'orange';\n      if (k === 'wordmark-ink') return 'cream';\n      return '';\n    }\n    function makeCard(k, opts={}) {\n      const v = SVGS[k];\n      const isFav = k.startsWith('favicon');\n      const isSoc = k === 'social-card';\n      const div = document.createElement('div');\n      div.className = `card ${cls(k)} ${isFav?'favicon':''} ${isSoc?'social':''}`;\n      const sizeKB = (v.length/1024).toFixed(1) + ' KB';\n      const dlLinks = (opts.png ? `<a href=\"#\" data-dl=\"${k}\" data-fmt=\"png\">PNG<\u002Fa>` : '') + `<a href=\"#\" data-dl=\"${k}\" data-fmt=\"svg\">SVG<\u002Fa>`;\n      div.innerHTML = `<div class=\"h\"><span>${k}<\u002Fspan><span class=\"sz\">${sizeKB}<\u002Fspan><\u002Fdiv><div class=\"b\">${v}<\u002Fdiv><div class=\"foot\">${dlLinks}<\u002Fdiv>`;\n      return div;\n    }\n    PRIMARY.forEach(k => document.getElementById('grid-primary').appendChild(makeCard(k)));\n    WORDMARK.forEach(k => document.getElementById('grid-wordmark').appendChild(makeCard(k)));\n    FAVICON.forEach(k => document.getElementById('grid-favicon').appendChild(makeCard(k, {png:true})));\n    SOCIAL.forEach(k => document.getElementById('grid-social').appendChild(makeCard(k, {png:true})));\n\n    /* ---- SVG → PNG via canvas ---- */\n    async function svgToPngBlob(svg, targetW, targetH) {\n      const svgBlob = new Blob([svg], { type: 'image/svg+xml;charset=utf-8' });\n      const url = URL.createObjectURL(svgBlob);\n      try {\n        const img = await new Promise((res, rej) => {\n          const im = new Image();\n          im.onload = () => res(im);\n          im.onerror = (e) => rej(new Error('img load fail'));\n          im.src = url;\n        });\n        const c = document.createElement('canvas');\n        c.width = targetW; c.height = targetH;\n        const cx = c.getContext('2d');\n        cx.drawImage(img, 0, 0, targetW, targetH);\n        return await new Promise(res => c.toBlob(res, 'image/png'));\n      } finally {\n        URL.revokeObjectURL(url);\n      }\n    }\n\n    function svgIntrinsic(svg) {\n      const m = svg.match(/viewBox=\"0 0 ([\\d.]+) ([\\d.]+)\"/);\n      return { w: parseFloat(m[1]), h: parseFloat(m[2]) };\n    }\n\n    /* ---- Individual download links ---- */\n    function downloadBlob(blob, filename) {\n      const url = URL.createObjectURL(blob);\n      const a = document.createElement('a');\n      a.href = url; a.download = filename;\n      document.body.appendChild(a); a.click(); a.remove();\n      setTimeout(() => URL.revokeObjectURL(url), 1000);\n    }\n    document.body.addEventListener('click', async (ev) => {\n      const a = ev.target.closest('[data-dl]');\n      if (!a) return;\n      ev.preventDefault();\n      const k = a.dataset.dl, fmt = a.dataset.fmt;\n      const svg = SVGS[k];\n      if (fmt === 'svg') {\n        downloadBlob(new Blob([svg], { type: 'image/svg+xml' }), `${k}.svg`);\n      } else {\n        const { w, h } = svgIntrinsic(svg);\n        const scale = k === 'social-card' ? 1 : (k.startsWith('favicon') ? 1 : 4);\n        const blob = await svgToPngBlob(svg, Math.round(w*scale), Math.round(h*scale));\n        downloadBlob(blob, `${k}.png`);\n      }\n    });\n\n    setStatus('Construction des PNG haute résolution…');\n\n    /* ---- Pre-render PNGs for the bundle ---- */\n    const PNGS = {};\n    // Favicon multi-sizes from favicon-rounded\n    const favRoundedSvg = SVGS['favicon-rounded'];\n    const favRoundSvg = SVGS['favicon-round'];\n    const favSquareSvg = SVGS['favicon-square'];\n    for (const sz of [16, 32, 48, 64, 96, 180, 192, 256, 512]) {\n      PNGS[`favicon-${sz}.png`] = await svgToPngBlob(favRoundedSvg, sz, sz);\n    }\n    PNGS['favicon-round-512.png'] = await svgToPngBlob(favRoundSvg, 512, 512);\n    PNGS['favicon-square-512.png'] = await svgToPngBlob(favSquareSvg, 512, 512);\n\n    // Social card\n    PNGS['social-card.png'] = await svgToPngBlob(SVGS['social-card'], 1200, 630);\n    PNGS['social-card@2x.png'] = await svgToPngBlob(SVGS['social-card'], 2400, 1260);\n    // Square social variant (Instagram)\n    PNGS['social-square-1080.png'] = await (async () => {\n      // build a square version on the fly: use the social card SVG but render onto a square canvas with letterbox\n      const c = document.createElement('canvas');\n      c.width = 1080; c.height = 1080;\n      const cx = c.getContext('2d');\n      cx.fillStyle = '#f4f1ec';\n      cx.fillRect(0,0,1080,1080);\n      const svgBlob = new Blob([SVGS['social-card']], { type: 'image/svg+xml;charset=utf-8' });\n      const url = URL.createObjectURL(svgBlob);\n      const im = new Image();\n      await new Promise((res, rej) => { im.onload=res; im.onerror=()=>rej(new Error('sq')); im.src=url; });\n      // fit centered\n      const scale = 1080 / 1200;\n      const w = 1200*scale, h = 630*scale;\n      cx.drawImage(im, (1080-w)/2, (1080-h)/2, w, h);\n      URL.revokeObjectURL(url);\n      return await new Promise(r => c.toBlob(r, 'image/png'));\n    })();\n\n    // Hi-res primary logos\n    for (const k of ['logo-primary','logo-primary-inverse','logo-mono-dark','logo-mono-white','logo-stacked','logo-stacked-inverse','wordmark-orange','wordmark-ink','wordmark-white']) {\n      const { w, h } = svgIntrinsic(SVGS[k]);\n      PNGS[`${k}.png`] = await svgToPngBlob(SVGS[k], Math.round(w*4), Math.round(h*4));\n    }\n\n    setStatus(`Pack prêt : ${Object.keys(SVGS).length} SVG + ${Object.keys(PNGS).length} PNG`, 'ok');\n\n    /* ---- Build ZIP ---- */\n    async function buildZip({ includeSvg=true, includePng=true } = {}) {\n      const zip = new JSZip();\n      if (includeSvg) {\n        const svgFolder = zip.folder('svg');\n        for (const [k, v] of Object.entries(SVGS)) {\n          svgFolder.file(`${k}.svg`, v);\n        }\n      }\n      if (includePng) {\n        const pngFolder = zip.folder('png');\n        for (const [name, blob] of Object.entries(PNGS)) {\n          pngFolder.file(name, blob);\n        }\n      }\n      // README\n      const readme = `up Technologies — Pack logo\n================================\n\nContenu :\n${includeSvg ? '  svg/   — Tous les logos en SVG (vectoriel, recommandé pour le web)\\n' : ''}${includePng ? '  png/   — Versions PNG haute résolution (favicons, cartes sociales, exports)\\n' : ''}\nIntégration site web :\n  <link rel=\"icon\" type=\"image/svg+xml\" href=\"favicon-rounded.svg\">\n  <link rel=\"icon\" type=\"image/png\" sizes=\"32x32\" href=\"favicon-32.png\">\n  <link rel=\"apple-touch-icon\" href=\"favicon-180.png\">\n  <meta property=\"og:image\" content=\"social-card.png\">\n  <meta property=\"og:image:width\" content=\"1200\">\n  <meta property=\"og:image:height\" content=\"630\">\n\nRéseaux sociaux :\n  - Photo de profil :  favicon-round-512.png  (Instagram, X, LinkedIn)\n  - Open Graph :       social-card.png        (Facebook, LinkedIn, WhatsApp)\n  - Instagram post :   social-square-1080.png\n\nCouleurs de marque :\n  Orange  #EF8827\n  Ink     #11202A\n  Crème   #F4F1EC\n\nTypographies :\n  Pacifico (Google Fonts) — wordmark “up”\n  Inter Light/Regular (Google Fonts) — texte “Technologies”\n\nGénéré depuis le builder de la marque · ${new Date().toLocaleDateString('fr-FR')}\n`;\n      zip.file('README.txt', readme);\n      return await zip.generateAsync({ type: 'blob' });\n    }\n\n    /* ---- Pre-build the full zip to show its size ---- */\n    const fullZip = await buildZip();\n    const sizeMB = (fullZip.size / 1024 / 1024).toFixed(2);\n    document.getElementById('dl-size').textContent = `— ${sizeMB} MB`;\n\n    const dlAll = document.getElementById('dl-all');\n    const dlSvg = document.getElementById('dl-svg');\n    const dlPng = document.getElementById('dl-png');\n    dlAll.disabled = false; dlSvg.disabled = false; dlPng.disabled = false;\n\n    dlAll.addEventListener('click', () => downloadBlob(fullZip, 'up-technologies-logo-pack.zip'));\n    dlSvg.addEventListener('click', async () => {\n      const z = await buildZip({ includeSvg: true, includePng: false });\n      downloadBlob(z, 'up-technologies-logos-svg.zip');\n    });\n    dlPng.addEventListener('click', async () => {\n      const z = await buildZip({ includeSvg: false, includePng: true });\n      downloadBlob(z, 'up-technologies-logos-png.zip');\n    });\n\n  } catch (e) {\n    setStatus('Erreur : ' + e.message, 'err');\n    console.error(e);\n  }\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
